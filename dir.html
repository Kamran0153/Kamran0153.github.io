    <style>
        body {
            background-color: #FFFFFF;
            font-family: sans-serif;
            margin: 0;
            padding: 15px 20px;
        }
        
        /* The main two-column container */
        .header-container {
            display: flex;
            justify-content: space-between; /* Column 1 on left, Column 2 on right */
            align-items: center;            /* Vertically centers both columns */
            border-bottom: 2px solid #EEEEEE; /* Clean dividing line beneath the header */
            padding-bottom: 15px;
        }

        /* Column 1 styling */
        .profile-column {
            max-width: 50%;
        }

        .profile-column h1 {
            color: #000000;
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        .profile-column p {
            color: #555555;
            font-size: 14px;
            margin: 0;
            line-height: 1.4;
        }

        /* Column 2 styling (Navigation Menu) */
        .nav-links {
            display: flex;
            gap: 12px; /* Spacing between the navigation boxes */
            list-style: none;
            margin: 0;
            padding: 0;
        }

        /* Default State: Black border boxes */
        .nav-links a {
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            padding: 8px 14px;
            border: 1px solid #000000;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        /* Hover State */
        .nav-links a:hover {
            background-color: #F5F5F5;
        }

        /* Active Page State: Box turns completely red */
        .nav-links a.active {
            color: red;
            border-color: red;
        }
    </style>
</head>
