<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="windows-1252">
    <title>Welcome to Md Kamran Chowdhury Shisher's Homepage</title>
    <base href="." target="main">
    <style>
        body {
            background-color: #FFFFFF;
            font-family: sans-serif;
            margin: 0;
            padding: 15px 20px;
        }
        
        /* The main two-column container */
        .header-container {
            display: flex;
            justify-content: space-between; /* Column 1 on left, Column 2 on right */
            align-items: center;            /* Vertically centers both columns */
            border-bottom: 2px solid #EEEEEE; /* Clean dividing line beneath the header */
            padding-bottom: 15px;
        }

        /* Column 1 styling */
        .profile-column {
            max-width: 50%;
        }

        .profile-column h1 {
            color: #000000;
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        .profile-column p {
            color: #555555;
            font-size: 14px;
            margin: 0;
            line-height: 1.4;
        }

        /* Column 2 styling (Navigation Menu) */
        .nav-links {
            display: flex;
            gap: 20px; /* Spacing between plain text links */
            list-style: none;
            margin: 0;
            padding: 0;
        }

        /* Default State: Clean, black plain text links (No boxes or borders) */
        .nav-links a {
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 5px 0;
            transition: color 0.2s ease;
        }

        /* Hover State */
        .nav-links a:hover {
            color: #555555; /* Subtle dark gray on hover */
        }

        /* Active Page State: Just the text turns red when navigating */
        .nav-links a.active {
            color: red;
            background: none;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <!--<div class="profile-column">
            <h1>Md Kamran Chowdhury Shisher</h1>
            <p>Incoming Assistant Professor of Electrical and Computer Engineering<br>
            University of Colorado Colorado Springs</p>
        </div>-->
        
        <ul class="nav-links" id="menu">
            <li><a href="./main.html" class="active">Home</a></li>
            <li><a href="./publications.html">Publications</a></li>
            <li><a href="./teaching.html">Teaching</a></li>
            <li><a href="./talk.html">Talks</a></li>
            <li><a href="./services.html">Services</a></li>
            <li><a href="./KamranCV.pdf">CV</a></li>
        </ul>
    </header>

    <script>
        const links = document.querySelectorAll('#menu a');
        
        links.forEach(link => {
            link.addEventListener('click', function() {
                // Remove the red 'active' class from all links
                links.forEach(item => item.classList.remove('active'));
                
                // Add the red 'active' class to the clicked link
                this.classList.add('active');
            });
        });
    </script>

</body>
</html>
