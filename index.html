<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Kamran Chowdhury Shisher - Homepage</title>
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
    
    <style>
        /* Forces the web window to be full height without weird scroll bars */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Wraps the entire workspace layout vertically */
        .site-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Master navigation row block height rule */
        .nav-frame {
            width: 100%;
            height: 80px; /* Adjust this value if your top row needs more breathing room */
            border: none;
            overflow: hidden;
        }

        /* Main core profile container page content engine layout */
        .main-frame {
            width: 100%;
            flex-grow: 1; /* Automatically consumes all remaining vertical screen real estate */
            border: none;
        }
    </style>
</head>
<body>

    <div class="site-container">
        <iframe class="nav-frame" src="./dir.html" name="directory"></iframe>
        
        <iframe class="main-frame" src="./main.html" name="main"></iframe>
    </div>

</body>
</html>
